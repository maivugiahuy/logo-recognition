# Phase C: closed-set ViT-L/14 + ProxyNCAHN++
mode: closed_set
backbone: vit_l14_openai
input_size: 196
embed_dim: 128
init_from: checkpoints/vit_base.pt

optimizer:
  trunk_lr: 4.2e-6    # 3.0e-6 × √2 for batch 1024
  fc_lr: 4.2e-4       # 3.0e-4 × √2
  proxy_lr: 89        # 63 × √2
  trunk_wd: 0.2
  fc_wd: 0.001
  proxy_wd: 0.0
  trunk_beta2: 0.98
  fc_beta2: 0.98
  proxy_beta2: 0.999
  trunk_eps: 1.0e-6
  fc_eps: 1.0e-6
  proxy_eps: 1.0

scheduler:
  patience: 5
  factor: 0.25

early_stopping_patience: 5  # stop if no improvement after 5 epochs

training:
  epochs: 50
  batch_size: 1024  # k=64, m=16 — V100 32GB
  k: 64             # classes per batch
  m: 16             # images per class

amp: true
compile: true       # enabled on Linux; auto-disabled on Windows (no Triton)
num_workers: 10
persistent_workers: true
freeze_blocks: 0    # unfreeze all 12 blocks

loss:
  sigma: 0.06

hn_mining:
  map_path: data/processed/hn_map.json
  alpha1: 0.05
  alpha2: 0.35
  levenshtein_min: 2

data:
  split: closed_set
  min_side: 10

augmentation:
  color_jitter: true
  random_perspective: true
