# Class-agnostic logo detector — YOLOv8m (substitute for YoloV4/PL2K)
model: yolov8m.pt
data: data/processed/detector_yolo/dataset.yaml
imgsz: 512
epochs: 50          # reduced from 50: sufficient convergence on this dataset
batch: 64           # RTX 5060 Ti 16GB: 512px × batch64 uses ~12–13GB VRAM
device: 0
project: checkpoints
name: yolov8_logo
exist_ok: true
patience: 5         # early stopping if no improvement
save_period: 10
workers: 4          # dataloader workers
cache: disk          # cache images to disk to eliminate I/O bottleneck from epoch 2 onward