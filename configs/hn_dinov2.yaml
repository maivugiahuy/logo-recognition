# Phase C: closed-set DINOv2-B/14 + ProxyNCAHN++
mode: closed_set
backbone: dinov2_vitb14
input_size: 168        # 168/14=12 → 12×12=144 patches
embed_dim: 128
init_from: checkpoints/dinov2_base.pt

optimizer:
  trunk_lr: 3.0e-6
  fc_lr: 3.0e-4
  proxy_lr: 63
  trunk_wd: 0.05
  fc_wd: 0.001
  proxy_wd: 0.0
  trunk_beta2: 0.98
  fc_beta2: 0.98
  proxy_beta2: 0.999
  trunk_eps: 1.0e-6
  fc_eps: 1.0e-6
  proxy_eps: 1.0

scheduler:
  patience: 5
  factor: 0.25

early_stopping_patience: 5

training:
  epochs: 50
  batch_size: 256   # k=32, m=8
  k: 32
  m: 8

amp: true
compile: false      # Triton not supported on Windows
num_workers: 10
persistent_workers: true
freeze_blocks: 0

loss:
  sigma: 0.06

hn_mining:
  map_path: data/processed/hn_map.json
  alpha1: 0.05
  alpha2: 0.35
  levenshtein_min: 2

data:
  split: closed_set
  min_side: 10

augmentation:
  color_jitter: true
  random_perspective: true
