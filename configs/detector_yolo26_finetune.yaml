# Fine-tune từ best.pt hiện có → target mAP50 > 0.70
# Thay đổi chính so với detector_yolo26.yaml:
#   - model: best.pt (tiếp tục từ checkpoint đã train, không train lại từ đầu)
#   - imgsz: 640 (+5-8pp mAP trên logo nhỏ)
#   - lr0: 0.001 (fine-tune LR thấp)
#   - epochs: 30, patience: 10 (ngắn hơn vì đã pretrain tốt)
#   - box/cls weight tuned cho 1-class detector
model: runs/detect/checkpoints/yolo26m_logo/weights/best.pt
data: data/processed/detector_yolo/dataset.yaml
imgsz: 640
epochs: 20              # ngắn hơn 50 vì đã có base tốt (0.653)
batch: -1               # auto-batch fit VRAM
device: 0
project: checkpoints
name: yolo26m_logo_ft
exist_ok: true
patience: 10            # dừng sớm nếu không cải thiện
save_period: 5
workers: 8
cache: disk

# LR schedule
lr0: 0.001              # fine-tune: thấp hơn 10× default
lrf: 0.01
warmup_epochs: 1        # warmup ngắn vì đã pretrain

# Loss weights (1 class → giảm cls, tăng box)
box: 9.0                # default 7.5 → localize tốt hơn
cls: 0.3                # default 0.5 → ít quan trọng với 1 class