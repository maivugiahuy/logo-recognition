# Phase A: open-set ViT-B/32 + ProxyNCA++ (Table 3 best row)
mode: open_set
backbone: vit_b32_openai   # open_clip ViT-B/32 pretrained='openai'
input_size: 160
embed_dim: 128

optimizer:
  trunk_lr: 2.3e-6
  fc_lr: 1.5e-3
  proxy_lr: 71
  trunk_wd: 0.2
  fc_wd: 0.001
  proxy_wd: 0.0
  trunk_beta2: 0.98
  fc_beta2: 0.98
  proxy_beta2: 0.999
  trunk_eps: 1.0e-6
  fc_eps: 1.0e-6
  proxy_eps: 1.0

scheduler:
  patience: 2       # giảm LR nếu không cải thiện sau 2 epochs
  factor: 0.25

early_stopping_patience: 5  # dừng hẳn nếu không cải thiện sau 6 epochs

training:
  epochs: 15
  batch_size: 512   # k=64, m=8
  k: 64             # classes per batch
  m: 8              # images per class

amp: true
compile: false      # torch.compile không chạy trên Windows (Triton missing)
num_workers: 8
persistent_workers: true
freeze_blocks: 0    # unfreeze toàn bộ 12 blocks

loss:
  sigma: 0.06

data:
  split: open_set
  min_side: 10

augmentation:
  color_jitter: true
  random_perspective: true
