# Phase A: open-set ViT-B/32 + ProxyNCA++ (Table 3 best row)
mode: open_set
backbone: vit_b32_openai   # open_clip ViT-B/32 pretrained='openai'
input_size: 160
embed_dim: 128

optimizer:
  trunk_lr: 2.3e-6
  fc_lr: 1.5e-3
  proxy_lr: 71
  trunk_wd: 0.2
  fc_wd: 0.001
  proxy_wd: 0.0
  trunk_beta2: 0.98
  fc_beta2: 0.98
  proxy_beta2: 0.999
  trunk_eps: 1.0e-6
  fc_eps: 1.0e-6
  proxy_eps: 1.0

scheduler:
  patience: 2       # reduced from 4; stops ~2 epochs earlier
  factor: 0.25

training:
  epochs: 15        # reduced from 25; plateau scheduler stops early anyway
  batch_size: 192   # k=24, m=4 (MPerClassSampler)
  k: 24             # classes per batch
  m: 4              # images per class

amp: true           # mixed precision (bfloat16/float16)
compile: true       # torch.compile (~10-20% speedup)
num_workers: 8

loss:
  sigma: 0.06

data:
  split: open_set
  min_side: 10

augmentation:
  color_jitter: true
  random_perspective: true
