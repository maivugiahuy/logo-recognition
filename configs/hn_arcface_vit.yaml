# Phase C: closed-set ViT-B/32 + Sub-center ArcFace (K=3)
mode: closed_set
backbone: vit_b16_openai
input_size: 160
embed_dim: 128
init_from: checkpoints/vit_b16_arcface_base.pt

optimizer:
  trunk_lr: 3.0e-6
  fc_lr: 3.0e-4
  proxy_lr: 0.05
  trunk_wd: 0.2
  fc_wd: 0.001
  proxy_wd: 0.0
  trunk_beta2: 0.98
  fc_beta2: 0.98
  proxy_beta2: 0.999
  trunk_eps: 1.0e-6
  fc_eps: 1.0e-6
  proxy_eps: 1.0e-8

scheduler:
  patience: 5
  factor: 0.25

early_stopping_patience: 6

training:
  epochs: 60
  batch_size: 512   # k=64, m=8
  k: 64
  m: 8

amp: true
compile: false
num_workers: 10
persistent_workers: true
freeze_blocks: 0

loss:
  type: arcface
  K: 3              # 3 sub-centers per class (handles multi-modal brands)
  scale: 30.0
  margin: 0.5

hn_mining:
  map_path: data/processed/hn_map.json
  alpha1: 0.01
  alpha2: 0.35
  levenshtein_min: 2

data:
  split: closed_set
  min_side: 10

augmentation:
  color_jitter: true
  random_perspective: true
