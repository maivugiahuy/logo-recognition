# Phase A: open-set DINOv2-B/14 + ProxyNCA++
mode: open_set
backbone: dinov2_vitb14
input_size: 224        # must be divisible by patch size 14; 224 = 16×16 grid
embed_dim: 128

optimizer:
  trunk_lr: 5.0e-6    # DINOv2 stronger pretrain → lower trunk LR than CLIP ViT
  fc_lr: 1.5e-3
  proxy_lr: 71
  trunk_wd: 0.05
  fc_wd: 0.001
  proxy_wd: 0.0
  trunk_beta2: 0.98
  fc_beta2: 0.98
  proxy_beta2: 0.999
  trunk_eps: 1.0e-6
  fc_eps: 1.0e-6
  proxy_eps: 1.0

scheduler:
  patience: 5
  factor: 0.25

early_stopping_patience: 5

training:
  epochs: 50
  batch_size: 512   # k=64, m=8
  k: 64
  m: 8

amp: true
compile: false      # Triton not supported on Windows
num_workers: 10
persistent_workers: true
freeze_blocks: 0    # full fine-tune of all 12 blocks

loss:
  sigma: 0.06

data:
  split: open_set
  min_side: 10

augmentation:
  color_jitter: true
  random_perspective: true
