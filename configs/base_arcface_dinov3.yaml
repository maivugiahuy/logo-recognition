# Phase A: open-set DINOv3 ViT-B/16 + ArcFace (K=1)
mode: open_set
backbone: dinov3_vitb16
input_size: 160        # 160/16=10 → 10×10=100 patches
embed_dim: 128

optimizer:
  trunk_lr: 5.0e-6    # strong pretrain (1.689B images) → conservative trunk LR
  fc_lr: 1.5e-3
  proxy_lr: 0.05
  trunk_wd: 0.05
  fc_wd: 0.001
  proxy_wd: 0.0
  trunk_beta2: 0.98
  fc_beta2: 0.98
  proxy_beta2: 0.999
  trunk_eps: 1.0e-6
  fc_eps: 1.0e-6
  proxy_eps: 1.0e-8

scheduler:
  patience: 5
  factor: 0.25

early_stopping_patience: 8

training:
  epochs: 80
  batch_size: 512   # k=64, m=8 — 100 tokens at 160px fits at 512 batch
  k: 64
  m: 8

amp: true
compile: false
num_workers: 10
persistent_workers: true
freeze_blocks: 0

loss:
  type: arcface
  K: 1
  scale: 30.0
  margin: 0.5

data:
  split: open_set
  min_side: 10

augmentation:
  color_jitter: true
  random_perspective: true
